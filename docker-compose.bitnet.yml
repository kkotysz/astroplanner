services:
  bitnet:
    build:
      context: .
      dockerfile: docker/bitnet/Dockerfile
    container_name: astroplanner-bitnet
    ports:
      - "8080:8080"
    environment:
      BITNET_GGUF_REPO: microsoft/bitnet-b1.58-2B-4T-gguf
      BITNET_MODEL_NAME: BitNet-b1.58-2B-4T
      BITNET_QUANT_TYPE: i2_s
      BITNET_THREADS: 4
      BITNET_CTX_SIZE: 4096
      BITNET_N_PREDICT: 256
      BITNET_TEMPERATURE: 0.2
      BITNET_HOST: 0.0.0.0
      BITNET_PORT: 8080
      BITNET_ENABLE_CONT_BATCH: 1
      BITNET_MODEL_DIR: /data/models
      BITNET_LOG_DIR: /data/logs
      BITNET_USE_PRETUNED: 0
      # Set this only if your model download requires authentication.
      # HUGGING_FACE_HUB_TOKEN: hf_xxx
    volumes:
      - bitnet_models:/data/models
      - bitnet_logs:/data/logs
      - bitnet_hf:/data/hf
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/v1/models >/dev/null || exit 1"]
      interval: 20s
      timeout: 8s
      retries: 20
      start_period: 60s
    restart: unless-stopped

volumes:
  bitnet_models:
  bitnet_logs:
  bitnet_hf:
